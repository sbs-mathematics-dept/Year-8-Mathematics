  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ity:1; transform:none } 100%{ opacity:0; transform:translate(-6px,-6px) } }\n  @keyframes toolhold{ 0%{ opacity:0; transform:scale(.7) } 55%{ opacity:1; transform:scale(1) } 100%{ opacity:.9; transform:scale(1) } }\n  @keyframes trapMerge{ 0%{ opacity:0; transform:translateX(150px) rotate(180deg); } 22%{ opacity:.6; } 100%{ opacity:.92; transform:none; } }\n  .animstage .a-merge{ opacity:0; transform-box:fill-box; transform-origin:center; }\n  .animstage.playing .a-merge{ animation:trapMerge 1.8s var(--del,0s) both cubic-bezier(.45,.05,.2,1); }\n  @keyframes splitUp{ from{ transform:translateY(0); } to{ transform:translateY(-96px); } }\n  .animstage .a-splitup{ transform:translateY(0); }\n  .animstage.playing .a-splitup{ animation:splitUp 1.4s var(--del,0s) both cubic-bezier(.34,1.08,.5,1); }\n<\u002Fstyle>\n<script src=\"654c3fc8-47e5-4b91-80e2-08ed5e04df69\"><\u002Fscript>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"4d266e14-3a15-45c4-8891-bec4f350294f#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <section data-label=\"Title\" data-speaker-notes=\"Welcome to Unit 15: Distance, Area and Volume. This unit has four sections. First, converting between miles and kilometres. Then the area of a parallelogram and a trapezium. Then the volume of triangular prisms. Finally, the surface area of triangular prisms and pyramids. Tap through each slide, discuss the questions together, and use the memory drills to review.\">\n    <div class=\"slide\" data-screen-label=\"Title\" style=\"justify-content:center; background:linear-gradient(160deg,#FFFDF7,#EEF6FF);\">\n      <div class=\"blob\" style=\"width:420px;height:420px;background:var(--sky);top:-120px;right:-80px;animation:float 7s ease-in-out infinite;\"><\u002Fdiv>\n      <div class=\"blob\" style=\"width:300px;height:300px;background:var(--yellow);bottom:-100px;left:-60px;animation:float 9s ease-in-out infinite;\"><\u002Fdiv>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n        <span class=\"kicker\" style=\"align-self:flex-start;margin-bottom:22px;\">YEAR 8 · MATHS<\u002Fspan>\n        <div class=\"sub\" style=\"font-size:46px;color:var(--sky);\">Unit 15<\u002Fdiv>\n        <h1 class=\"title\" style=\"font-size:120px;max-width:1500px;\">Distance, Area &amp; Volume<\u002Fh1>\n        <p class=\"sub\" style=\"margin-top:18px;font-size:38px;\">Miles &amp; kilometres · parallelograms &amp; trapezia · prisms · surface area<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Getting started\" data-speaker-notes=\"Getting started — a warm-up of what you already know. Tap each card as we discuss it. Question 1: fraction calculations. One eighth of 32 is 4. Five eighths of 32 is 20. One fifth of 15 is 3. Eight fifths of 15 is 24. Question 2: area of a rectangle is length times width, 12 times 5 is 60 square centimetres. Area of a triangle is half base times height, half times 8 times 7 is 28 square metres. Question 3: volume of the cuboid is 6 times 4 times 3, giving 72 cubic centimetres. Surface area adds all six faces, giving 108 square centimetres.\">\n    <div class=\"slide\" data-screen-label=\"Getting started\">\n      <div class=\"head\"><span class=\"kicker\">GETTING STARTED · TAP TO CHECK<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">What we already know<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;gap:20px;justify-content:center;\">\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:28px;\"><b class=\"hl-t\">1)<\u002Fb> Work out: <span style=\"display:inline-flex;gap:30px;flex-wrap:wrap;margin-top:12px;font-size:34px;\">a) <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1;vertical-align:middle;font-size:.72em;\"><span style=\"border-bottom:2px solid currentColor;padding:0 4px;\">1<\u002Fspan><span style=\"padding:0 4 \" style=\"font-family:var(--disp);font-weight:700;font-size:38px;line-height:1.35;background:#EAFBF6;border-color:#B8E9DE;\"><span style=\"color:var(--muted);font-size:26px;\">In this section you will…<\u002Fspan><br>convert between <b>miles<\u002Fb> and <b>kilometres<\u002Fb>.<\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap;\"><span style=\"font-family:var(--disp);font-weight:800;font-size:26px;color:var(--muted);\">Key words:<\u002Fspan><span class=\"secchip\">kilometre<\u002Fspan><span class=\"secchip\">mile<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Miles &amp; km concept\" data-speaker-notes=\"Here is the big idea. A kilometre is a shorter unit than a mile. One kilometre is about five eighths of a mile. If the blue line is one mile, the red line shows one kilometre — it is shorter. To convert kilometres to miles, multiply by five eighths. To convert miles to kilometres, multiply by eight fifths. Watch the red kilometre bar appear, then read the two rules.\">\n    <div class=\"slide\" data-screen-label=\"Miles &amp; km concept\">\n      <div class=\"head\"><span class=\"kicker\">THE BIG IDEA<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">A kilometre is shorter than a mile<\u002Fh2>\n      <p class=\"instr\"><span class=\"dot\"><\u002Fspan><span>One kilometre is about <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1;vertical-align:middle;font-size:.72em;\"><span style=\"border-bottom:2px solid currentColor;padding:0 3px;\">5<\u002Fspan><span style=\"padding:0 3px;\">8<\u002Fspan><\u002Fspan> of a mile.<\u002Fspan><\u002Fp>\n      <div class=\"animstage fill\" style=\"display:flex;flex-direction:column;justify-content:center;gap:26px;\">\n        <div class=\"gridwrap\" style=\"max-width:780px;padding:12px;\"><svg viewBox=\"0 0 720 170\" style=\"width:100%;height:auto;max-width:760px;\"><line x1=\"50\" y1=\"68\" x2=\"50 m;\"><span style=\"border-bottom:2px solid currentColor;padding:0 3px;\">5<\u002Fspan><span style=\"padding:0 3px;\">8<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"card a-late\" style=\"--del:1.9s;font-family:var(--disp);font-weight:800;font-size:34px;background:#FFF1EF;border-color:#FFC9C1;\">miles → km: &nbsp;× <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1;vertical-align:middle;font-size:.72em;\"><span style=\"border-bottom:2px solid currentColor;padding:0 3px;\">8<\u002Fspan><span style=\"padding:0 3px;\">5<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\"><button class=\"replaybtn\" data-replay=\"\">↺ Play again<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Worked example 15.1\" data-speaker-notes=\"Worked example 15.1. Part a: which is greater, 20 miles or 20 km? One mile is greater than one km, so 20 miles is greater. Part b: convert 72 km into miles. Divide 72 by 8 to get 9, then multiply by 5 to get 45 miles. Part c: convert 50 miles into km. Divide 50 by 5 to get 10, then multiply by 8 to get 80 km. Part d: which is further, 200 km or 120 miles? Convert 200 km into miles: 200 divided by 8 is 25, times 5 is 125 miles. 125 is greater than 120, so 200 km is further.\">\n    <div class=\"slide\" data-screen-label=\"Worked example 15.1\">\n      <div class=\"head\"><span class=\"kicker teal\">WORKED EXAMPLE 15.1<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Comparing and converting distances<\u002Fh2>\n      <div class=\"fill\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;align-content:center;\">\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.45;\"><b class=\"hl-t\">a)<\u002Fb> Which is greater, 20 miles or 20 km?<br><span style=\"color:var(--muted);font-size:22px;\">1 mile &gt; 1 km, so<\u002Fspan> <b>20 miles<\u002Fb> is greater.<\u002Fdiv>\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.45;\"><b class=\"hl-t\">b)<\u002Fb> Convert 72 km into miles.<br>72 ÷ 8 = 9, &nbsp; 9 × 5 = <b>45 miles<\u002Fb><\u002Fdiv>\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.45;\"><b class=\"hl-t\">c)<\u002Fb> Convert 50 miles into km.<br>50 ÷ 5 = 10, &nbsp; 10 × 8 = <b>80 km<\u002Fb><\u002Fdiv>\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.45;\"><b class=\"hl-t\">d)<\u002Fb> Further: 200 km or 120 miles?<br>200 ÷ 8 = 25, &nbsp; 25 × 5 = 125 miles.<br><b>200 km<\u002Fb> is further (125 &gt; 120).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Ex 15.1 · Q3\" data-speaker-notes=\"Exercise 15.1, question 3. Copy and complete these conversions from kilometres to miles. Remember: to change km to miles, divide by 8 then multiply by 5. Part a: 64 km. 64 divided by 8 is 8, times 5 is 40 miles. Part b: 40 km. 40 divided by 8 is 5, times 5 is 25 miles. Part c: 56 km. 56 divided by 8 is 7, times 5 is 35 miles.\">\n    <div class=\"slide\" data-screen-label=\"Ex 15.1 · Q3\">\n      <div class=\"head\"><span class=\"kicker\">EXERCISE 15.1 · Q3 · TAP TO CHECK<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Convert kilometres → miles<\u002Fh2>\n      <p class=\"instr\"><span class=\"dot\"><\u002Fspan><span>Copy and complete. &nbsp;km → miles: divide by 8, then × 5.<\u002Fspan><\u002Fp>\n      <div class=\"fill\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;align-content:center;\">\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">a)<\u002Fb> 64 km &nbsp; → &nbsp; 64 ÷ 8 = 8 &nbsp; 8 × 5 = ▢ miles<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;line-height:1.45;\">8 × 5 = <b>40 miles<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">b)<\u002Fb> 40 km &nbsp; → &nbsp; 40 ÷ 8 = ▢ &nbsp; ▢ × 5 = ▢ miles<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;line-height:1.45;\">40 ÷ 8 = 5, &nbsp; 5 × 5 = <b>25 miles<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">c)<\u002Fb> 56 km &nbsp; → &nbsp; 56 ÷ ▢ = ▢ &nbsp; ▢ × ▢ = ▢ miles<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;line-height:1.45;\">56 ÷ 8 = 7, &nbsp; 7 × 5 = <b>35 miles<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Ex 15.1 · Q4\" data-speaker-notes=\"Exercise 15.1, question 4. Copy and complete these conversions from miles to kilometres. To change miles to km, divide by 5 then multiply by 8. Part a: 55 miles. 55 divided by 5 is 11, times 8 is 88 km. Part b: 20 miles. 20 divided by 5 is 4, times 8 is 32 km. Part c: 85 miles. 85 divided by 5 is 17, times 8 is 136 km.\">\n    <div class=\"slide\" data-screen-label=\"Ex 15.1 · Q4\">\n      <div class=\"head\"><span class=\"kicker\">EXERCISE 15.1 · Q4 · TAP TO CHECK<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Convert miles → kilometres<\u002Fh2>\n      <p class=\"instr\"><span class=\"dot\"><\u002Fspan><span>Copy and complete. &nbsp;miles → km: divide by 5, then × 8.<\u002Fspan><\u002Fp>\n      <div class=\"fill\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;align-content:center;\">\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">a)<\u002Fb> 55 miles &nbsp; → &nbsp; 55 ÷ 5 = 11 &nbsp; 11 × 8 = ▢ km<\u002Fdiv><div class=\"rev\" style=\"font-siz es 20 cents is 27,840 cents, which is 278 dollars 40. That is more than 250 dollars, so Evan is correct.\">\n    <div class=\"slide\" data-screen-label=\"Ex 15.1 · Q11\">\n      <div class=\"head\"><span class=\"kicker\">EXERCISE 15.1 · Q11 · TAP TO CHECK<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Evan the salesman<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;max-width:1500px;\">\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.45;background:#FFF6E9;border-color:#F0DCB0;\">A milometer shows the <b>total distance<\u002Fb> a car has travelled. Evan is a salesman.<br>Start of the week: <b>125 465 miles<\u002Fb> &nbsp;·&nbsp; End of the week: <b>126 335 miles<\u002Fb><\u002Fdiv>\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">a)<\u002Fb> How many <b>kilometres<\u002Fb> has Evan travelled this week?<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;line-height:1.45;\">126 335 − 125 465 = 870 miles. &nbsp; 870 ÷ 5 = 174, &nbsp; 174 × 8 = <b>1392 km<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">b)<\u002Fb> Evan is paid 20 cents per km. He says he will be paid more than $250. Is he correct? Explain.<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;line-height:1.45;\">1392 × 20c = 27 840c = <b>$278.40<\u002Fb>. That is more than $250, so <b>Evan is correct<\u002Fb>.<\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Miles &amp; km drill\" data-speaker-notes=\"A quick memory drill for miles and kilometres. Flip each card. Which is longer, a mile or a kilometre? A mile. To change km to miles, multiply by five eighths. To change miles to km, multiply by eight fifths. One kilometre is about five eighths of a mile.\">\n    <div class=\"slide\" data-screen-label=\"Miles &amp; km drill\">\n      <div class=\"head\"><span class=\"kicker yellow\">MEMORY DRILL · FLIP THE CARDS<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Miles ↔ kilometres<\u002Fh2>\n      <div class=\"fill drillgrid\" style=\"align-content:center;\">\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Which is longer?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">A mile<\u002Fdiv><div class=\"fhint\">mile &gt; km<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">km → miles:<br>multiply by…<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">× <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1;vertical-align:middle;font-size:.72em;\"><span style=\"border-bottom:2px solid currentColor;padding:0 3px;\">5<\u002Fspan><span style=\"padding:0 3px;\">8<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"fhint\">divide by 8, × 5<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">miles → km:<br>multiply by…<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">× <span style=\"display:inline-flex;flex-direction:column;align-items:center;line-height:1;vertical-align:middle;font-size:.72em;\"><span style=\"border-bottom:2px solid currentColor;padding:0 3px;\">8<\u002Fspan><span style=\"padding:0 3px;\">5<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"fhint\">divide by 5, × 8<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"15.2 Goals\" data-speaker-notes=\"Section 15.2: the area of a parallelogram and a trapezium. In this section you will derive and use the formulae for the area of a parallelogram and a trapezium. Key word: trapezia, the plural of trapezium.\">\n    <div class=\"slide\" data-screen-label=\"15.2 Goals\" style=\"justify-content:center;background:linear-gradient(160deg,#FFFDF7,#EEF6FF);\">\n      <div class=\"blob\" style=\"width:380px;height:380px;background:var(--sky);top:-120px;right:-60px;\"><\u002Fdiv>\n      <div class=\"head\"><span class=\"kicker sky\">SECTION 15.2<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:64px;max-width:1400px;\">15.2 The area of a parallelogram and a trapezium<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;justify-content:center;gap:28px;max-width:1400px;\">\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:38px;line-height:1.35;background:#EAFBF6;border-color:#B8E9DE;\"><span style=\"color:var(--muted);font-size:26px;\">In this section you will…<\u002Fspan><br>derive and use the formulae for the area of a <b>parallelogram<\u002Fb> and a <b>trapezium<\u002Fb>.<\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap;\"><span style=\"font-family:var(--disp);font-weight:800;font-size:26px;color:var(--muted);\">Key word:<\u002Fspan><span class=\"secchip\">trapezia<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Area concept\" data-speaker-notes=\"Here is the big idea. For a parallelogram, imagine cutting the triangle from the left end and moving it to the right end — you make a rectangle with the same base and height. So the area of a parallelogram is base times height, A equals b h. For a trapezium, the parallel sides are a and b and the height is h. Two identical trapezia fit together to make a parallelogram with base a plus b and height h. So one trapezium is half of that: A equals one half times a plus b, times h.\">\n    <div class=\"slide\" data-screen-label=\"Area concept\">\n      <div class=\"head\"><span class=\"kicker sky\">THE BIG IDEA<\u002Fspan><\u002Fdiv>\n<h2 class=\"title\">Why the trapezium formula works<\u002Fh2>\n      <p class=\"instr\"><span class=\"dot\"><\u002Fspan><span>You already know a parallelogram is <b>A = b × h<\u002Fb>. Here is <b>why<\u002Fb> a trapezium is <b>A = ½(a + b)h<\u002Fb>.<\u002Fspan><\u002Fp>\n      <div class=\"animstage fill\" style=\"display:flex;gap:44px;align-items:center;\">\n        <div style=\"flex:1.05;\"><div class=\"gridwrap\" style=\"max-width:660px;padding:16px;margin:0 auto;\"><svg viewBox=\"0 0 540 360\" style=\"width:100%;height:auto;\">\n  <polygon class=\"a-pop\" style=\"--del:.15s\" points=\"110,160 250,160 300,300 60,300\" fill=\"rgba(78,168,255,.5)\" stroke=\"#2b7fd4\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpolygon>\n  <line class=\"a-late\" style=\"--del:.55s\" x1=\"180\" y1=\"160\" x2=\"180\" y2=\"300\" stroke=\"#6A7590\" stroke-width=\"2.5\" stroke-dasharray=\"6 5\"><\u002Fline>\n  <text x=\"180\" y=\"150\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"28\" fill=\"#2b7fd4\" text-anchor=\"middle\" class=\"a-late\" style=\"--del:.6s\">a<\u002Ftext>\n  <text x=\"180\" y=\"328\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"28\" fill=\"#2b7fd4\" text-anchor=\"middle\" class=\"a-late\" style=\"--del:.6s\">b<\u002Ftext>\n  <text x=\"200\" y=\"244\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"26\" fill=\"#4a5670\" text-anchor=\"start\" class=\"a-late\" style=\"--del:.6s\">h<\u002Ftext>\n  <polygon class=\"a-merge\" style=\"--del:1.3s\" points=\"440,300 300,300 250,160 490,160\" fill=\"rgba(242,179,61,.55)\" stroke=\"#c8891a\" stroke-width=\"3\" stroke-dasharray=\"7 5\" stroke-linejoin=\"round\"><\u002Fpolygon>\n  <polygon class=\"a-late\" style=\"--del:3.2s\" points=\"110,160 490,160 440,300 60,300\" fill=\"none\" stroke=\"#21304A\" stroke-width=\"3.5\" stroke-linejoin=\"round\"><\u002Fpolygon>\n  <g class=\"a-late\" style=\"--del:3.6s\">\n    <line x1=\"110\" y1=\"140\" x2=\"490\" y2=\"140\" stroke=\"#21304A\" stroke-width=\"2.5\"><\u002Fline>\n    <line x1=\"110\" y1=\"133\" x2=\"110\" y2=\"147\" stroke=\"#21304A\" stroke-width=\"2.5\"><\u002Fline>\n    <line x1=\"490\" y1=\"133\" x2=\"490\" y2=\"147\" stroke=\"#21304A\" stroke-width=\"2.5\"><\u002Fline>\n    <text x=\"300\" y=\"127\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"26\" fill=\"#21304A\" text-anchor=\"middle\">a + b<\u002Ftext>\n  <\u002Fg>\n<\u002Fsvg><\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:15px;\">\n          <div class=\"card a-late\" style=\"--del:.4s;font-family:var(--disp);font-weight:700;font-size:27px;line-height:1.4;\"><b class=\"hl-t\">1 ·<\u002Fb> Start with a trapezium — parallel sides <b>a<\u002Fb> and <b>b<\u002Fb>, height <b>h<\u002Fb>.<\u002Fdiv>\n          <div class=\"card a-late\" style=\"--del:1.2s;font-family:var(--disp);font-weight:700;font-size:27px;line-height:1.4;\"><b class=\"hl-t\">2 ·<\u002Fb> Rotate an identical <b>copy 180°<\u002Fb> and slide it to fit.<\u002Fdiv>\n          <div class=\"card a-late\" style=\"--del:3.2s;font-family:var(--disp);font-weight:700;font-size:27px;line-height:1.4;\"><b class=\"hl-t\">3 ·<\u002Fb> Together they make a <b>parallelogram<\u002Fb>: base <b>(a + b)<\u002Fb>, height <b>h<\u002Fb>.<\u002Fdiv>\n          <div class=\"card a-late\" style=\"--del:3.7s;font-family:var(--disp);font-weight:700;font-size:27px;line-height:1.4;background:#FFF6E9;border-color:#F0DCB0;\">Parallelogram area = <b>(a + b) × h<\u002Fb><\u002Fdiv>\n          <div class=\"card a-late\" style=\"--del:4.4s;font-family:var(--disp);font-weight:700;font-size:27px;line-height:1.4;background:#EAFBF6;border-color:#B8E9DE;\">One trapezium is <b>half<\u002Fb>: &nbsp;<b>A = ½ × (a + b) × h<\u002Fb><\u002Fdiv>\n          <div style=\"margin-top:2px;\"><button class=\"replaybtn\" data-replay=\"\">↺ Play again<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Worked example 15.2\" data-speaker-notes=\"Worked example 15.2. Work out the area of each shape. Part a is a parallelogram with base 7 cm and height 5 cm. Write the formula A equals b h, substitute: 7 times 5 equals 35 square centimetres. Part b is a trapezium with parallel sides 12 mm and 18 mm and height 8 mm. Write A equals a half times a plus b times h. Work out 12 plus 18 equals 30 first. Then a half of 30 is 15. Finally 15 times 8 equals 120 square millimetres.\">\n    <div class=\"slide\" data-screen-label=\"Worked example 15.2\">\n      <div class=\"head\"><span class=\"kicker teal\">WORKED EXAMPLE 15.2<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Work out the area of each shape<\u002Fh2>\n      <div class=\"fill\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;align-content:center;\">\n        <div style=\"display:flex;flex-direction:column;gap:14px;align-items:center;\"><div class=\"gridwrap\" style=\"max-width:380px;padding:12px;\"><svg viewBox=\"0 0 311 212\" role=\"img\" style=\"width:100%;height:auto;max-width:311px;\"><polygon points=\"90,46 265,46 221,166 46,166\" fill=\"rgba(255,107,91,.32)\" stroke=\"#FF6B5B\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpolygon><line x1=\"110\" y1=\"46\" x2=\"110\" y2=\"166\" stroke=\"#21304A\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><text x=\"122\" y=\"112\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"start\">5 cm<\u002Ftext><text x=\"155.5\" y=\"196\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"middle\">7 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><div class=\"card\" style=\"font-family:var(--disp);font-wei x 15.2 · Q11\">\n      <div class=\"head\"><span class=\"kicker\">EXERCISE 15.2 · Q11 · TAP TO CHECK<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Work backwards to the base<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;gap:16px;justify-content:center;max-width:1400px;\">\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:28px;line-height:1.4;\">A parallelogram has an area of <b>832 mm²<\u002Fb> and a perpendicular height of <b>2.6 cm<\u002Fb>.<br>What is the length of the base? <span style=\"color:var(--muted);font-size:23px;\">(Be careful with the units.)<\u002Fspan><\u002Fdiv>\n        <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:23px;line-height:1.35;\"><b class=\"hl-t\">)<\u002Fb> Find the base<\u002Fdiv><div class=\"rev\" style=\"font-size:23px;line-height:1.4;\">A = bh, so b = A ÷ h = 832 ÷ 2.6 = <b>320 mm<\u002Fb> = <b>32 cm<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Area drill\" data-speaker-notes=\"A quick memory drill for area. Flip each card. The area of a parallelogram is base times height. The area of a trapezium is a half times a plus b, times h. Remember the trapezium needs the two parallel sides added first.\">\n    <div class=\"slide\" data-screen-label=\"Area drill\">\n      <div class=\"head\"><span class=\"kicker yellow\">MEMORY DRILL · FLIP THE CARDS<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Area formulae<\u002Fh2>\n      <div class=\"fill drillgrid\" style=\"align-content:center;\">\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Area of a<br>parallelogram?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">A = bh<\u002Fdiv><div class=\"fhint\">base × height<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Area of a<br>trapezium?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">A = ½(a+b)h<\u002Fdiv><div class=\"fhint\">add the parallel sides first<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Trapezium: what<br>are a and b?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">the parallel sides<\u002Fdiv><div class=\"fhint\">h is the perpendicular height<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"15.3 Goals\" data-speaker-notes=\"Section 15.3: calculating the volume of triangular prisms. In this section you will derive and use the formula for the volume of a triangular prism. Key words: cross-section and prism. A prism is a 3D shape which has the same 2D shape all the way through its length. That 2D shape is called the cross-section.\">\n    <div class=\"slide\" data-screen-label=\"15.3 Goals\" style=\"justify-content:center;\">\n      <div class=\"blob\" style=\"width:380px;height:380px;background:var(--teal);top:-120px;right:-60px;\"><\u002Fdiv>\n      <div class=\"head\"><span class=\"kicker teal\">SECTION 15.3<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:64px;max-width:1400px;\">15.3 Calculating the volume of triangular prisms<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;justify-content:center;gap:28px;max-width:1400px;\">\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:38px;line-height:1.35;background:#EAFBF6;border-color:#B8E9DE;\"><span style=\"color:var(--muted);font-size:26px;\">In this section you will…<\u002Fspan><br>derive and use the formula for the <b>volume of a triangular prism<\u002Fb>.<\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap;\"><span style=\"font-family:var(--disp);font-weight:800;font-size:26px;color:var(--muted);\">Key words:<\u002Fspan><span class=\"secchip\">cross-section<\u002Fspan><span class=\"secchip\">prism<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Volume concept\" data-speaker-notes=\"Here is the big idea. A cuboid is a rectangular prism. When you work out length times base times height, you can start with base times height — that is the area of the rectangular cross-section — then multiply by the length to get the volume. A triangular prism works the same way. Its cross-section is a triangle. So the volume of any prism is the area of its cross-section times its length.\">\n    <div class=\"slide\" data-screen-label=\"Volume concept\">\n      <div class=\"head\"><span class=\"kicker\" style=\"background:#0e8f77;\">THE BIG IDEA<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Volume = area of cross-section × length<\u002Fh2>\n      <p class=\"instr\"><span class=\"dot\"><\u002Fspan><span>A <b>prism<\u002Fb> keeps the same cross-section all along its length.<\u002Fspan><\u002Fp>\n      <div class=\"animstage fill\" style=\"display:flex;flex-direction:column;justify-content:center;gap:20px;\">\n        <div style=\"display:flex;gap:40px;align-items:center;justify-content:center;flex-wrap:wrap;\">\n          <div style=\"text-align:center;\"><div class=\"gridwrap\" style=\"max-width:300px;padding:12px;\"><svg viewBox=\"0 0 290 202\" role=\"img\" style=\"width:100%;height:auto;max-width:290px;\"><polygon points=\"100,40 250,40 250,124 100,124\" fill=\"none\" stroke=\"#c8891a\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-dasharray=\"5 4\"><\u002Fpolygon><line x1=\"40\" y1=\"78\" x2=\"100\" y2=\"40\" stroke=\"#c8891a\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><polygon points=\"190,78 250,40 250,124 xt><text x=\"52\" y=\"131\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"25\" fill=\"#21304A\" text-anchor=\"start\">8 mm<\u002Ftext><\u002Fsvg><\u002Fdiv><div class=\"tile q\" data-toggle=\"\" style=\"width:100%;\"><div class=\"num\" style=\"font-size:26px;\"><b class=\"hl-t\">b)<\u002Fb> compound prism (millimetres)<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;\">Volume = <b>1980 mm³<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Volume drill\" data-speaker-notes=\"A quick memory drill for volume. Flip each card. The volume of any prism is the area of its cross-section times its length. The cross-section of a triangular prism is a triangle, so its area is a half times base times height. For a compound prism, split it into simple prisms, find each volume, then add.\">\n    <div class=\"slide\" data-screen-label=\"Volume drill\">\n      <div class=\"head\"><span class=\"kicker yellow\">MEMORY DRILL · FLIP THE CARDS<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Volume of prisms<\u002Fh2>\n      <div class=\"fill drillgrid\" style=\"align-content:center;\">\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Volume of<br>any prism?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">area of<br>cross-section × length<\u002Fdiv><div class=\"fhint\">same shape all through<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Cross-section of a<br>triangular prism?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">a triangle<\u002Fdiv><div class=\"fhint\">area = ½ × b × h<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Compound<br>prism?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">split, then add<\u002Fdiv><div class=\"fhint\">cuboid + triangular prism<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"15.4 Goals\" data-speaker-notes=\"Section 15.4: calculating the surface area of triangular prisms and pyramids. In this section you will calculate the surface area of triangular prisms and pyramids. Key words: net and surface area. You already know how to draw the net of a cube or cuboid to find its surface area. You use the same method for prisms and pyramids.\">\n    <div class=\"slide\" data-screen-label=\"15.4 Goals\" style=\"justify-content:center;\">\n      <div class=\"blob\" style=\"width:380px;height:380px;background:var(--teal);top:-120px;right:-60px;\"><\u002Fdiv>\n      <div class=\"head\"><span class=\"kicker teal\">SECTION 15.4<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\" style=\"font-size:58px;max-width:1450px;\">15.4 Calculating the surface area of triangular prisms and pyramids<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;justify-content:center;gap:28px;max-width:1450px;\">\n        <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:38px;line-height:1.35;background:#EAFBF6;border-color:#B8E9DE;\"><span style=\"color:var(--muted);font-size:26px;\">In this section you will…<\u002Fspan><br>calculate the <b>surface area<\u002Fb> of triangular prisms and pyramids.<\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap;\"><span style=\"font-family:var(--disp);font-weight:800;font-size:26px;color:var(--muted);\">Key words:<\u002Fspan><span class=\"secchip\">net<\u002Fspan><span class=\"secchip\">surface area<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Surface area concept\" data-speaker-notes=\"Here is the idea. The surface area of a solid is the total area of all its faces. A helpful way to see every face is to open the solid out flat into its net. Then you work out the area of each face and add them all together. A triangular prism has two triangular faces and three rectangular faces. Remember to include every face.\">\n    <div class=\"slide\" data-screen-label=\"Surface area concept\">\n      <div class=\"head\"><span class=\"kicker teal\">THE BIG IDEA<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Open the solid into a net, then add every face<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;gap:34px;align-items:center;justify-content:center;flex-wrap:wrap;\">\n        <div class=\"gridwrap\" style=\"max-width:609px;padding:12px;\"><svg viewBox=\"0 0 353 276\" role=\"img\" style=\"width:100%;height:auto;max-width:624px;\"><polygon points=\"85,90 150,90 150,194 85,194\" fill=\"rgba(78,168,255,.28)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"117.5\" y=\"142\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"middle\">B<\u002Ftext><polygon points=\"228,90 293,90 293,194 228,194\" fill=\"rgba(78,168,255,.28)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"260.5\" y=\"142\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"middle\">C<\u002Ftext><polygon points=\"150,90 228,90 228,194 150,194\" fill=\"rgba(22,198,164,.32)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"189\" y=\"142\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"middle\">A<\u002Ftext><polygon points=\"150,90 228,90 189,38\" fill=\"rgba(255,107,91,.3)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"189\" y=\"67.9\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"17\" fill=\"#21304A\" text-anchor=\"middle\">D<\u002Ftext><polygon points=\"150,194 228,194 189,246\" fill=\"rgba(255,107,91,.3)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"189\" y=\"226.5\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"17\" fill=\"#21304A\" text-anchor=\"middle\">E<\u002Ftext><text x=\"189\" y=\"166\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"15\" fill=\"#6A7590\" text-anchor=\"middle\">6 cm<\u002Ftext><text x=\"260.5\" y=\"166\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"15\" fill=\"#6A7590\" text-anchor=\"middle\">8 cm<\u002Ftext><text x=\"195\" y=\"56.199999999999996\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"14\" fill=\"#6A7590\" text-anchor=\"start\">4 cm<\u002Ftext><text x=\"117.5\" y=\"166\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"15\" fill=\"#6A7590\" text-anchor=\"middle\">5 cm<\u002Ftext><\u002Fsvg><\u002Fdiv>\n        <div style=\"flex:1;min-width:320px;display:flex;flex-direction:column;gap:14px;\">\n          <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:32px;line-height:1.4;\"><b>Surface area<\u002Fb> = the total area of <b>all the faces<\u002Fb>.<\u002Fdiv>\n          <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:30px;line-height:1.4;background:#EAFBF6;border-color:#B8E9DE;\">A triangular prism has <b>2 triangles<\u002Fb> + <b>3 rectangles<\u002Fb>. Draw the net, find each area, add them up.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Worked example 15.4\" data-speaker-notes=\"Worked example 15.4. The diagram shows a triangular prism. Part a: sketch a net of the prism. It has a rectangular base A measuring 8 by 6, two rectangular faces B and C measuring 8 by 5, and two triangular faces D and E each with base 6 and height 4. Part b: work out the surface area. Area A equals 8 times 6 equals 48. Area B equals 8 times 5 equals 40, and C is the same. Area D equals a half times 6 times 4 equals 12, and E is the same. Surface area equals 48 plus 40 times 2 plus 12 times 2 equals 48 plus 80 plus 24 equals 152 square centimetres.\">\n    <div class=\"slide\" data-screen-label=\"Worked example 15.4\">\n      <div class=\"head\"><span class=\"kicker teal\">WORKED EXAMPLE 15.4<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Net &amp; surface area of a prism<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;gap:30px;align-items:center;\">\n        <div style=\"flex:0 0 auto;\"><div class=\"gridwrap\" style=\"max-width:588px;padding:12px;\"><svg viewBox=\"0 0 353 276\" role=\"img\" style=\"width:100%;height:auto;max-width:602px;\"><polygon points=\"85,90 150,90 150,194 85,194\" fill=\"rgba(78,168,255,.28)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"117.5\" y=\"142\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"middle\">B<\u002Ftext><polygon points=\"228,90 293,90 293,194 228,194\" fill=\"rgba(78,168,255,.28)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"260.5\" y=\"142\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"middle\">C<\u002Ftext><polygon points=\"150,90 228,90 228,194 150,194\" fill=\"rgba(22,198,164,.32)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"189\" y=\"142\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"20\" fill=\"#21304A\" text-anchor=\"middle\">A<\u002Ftext><polygon points=\"150,90 228,90 189,38\" fill=\"rgba(255,107,91,.3)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"189\" y=\"67.9\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"17\" fill=\"#21304A\" text-anchor=\"middle\">D<\u002Ftext><polygon points=\"150,194 228,194 189,246\" fill=\"rgba(255,107,91,.3)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"189\" y=\"226.5\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"17\" fill=\"#21304A\" text-anchor=\"middle\">E<\u002Ftext><text x=\"189\" y=\"166\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"15\" fill=\"#6A7590\" text-anchor=\"middle\">6 cm<\u002Ftext><text x=\"260.5\" y=\"166\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"15\" fill=\"#6A7590\" text-anchor=\"middle\">8 cm<\u002Ftext><text x=\"195\" y=\"56.199999999999996\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"14\" fill=\"#6A7590\" text-anchor=\"start\">4 cm<\u002Ftext><text x=\"117.5\" y=\"166\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"15\" fill=\"#6A7590\" text-anchor=\"middle\">5 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><div style=\"text-align:center;font-family:var(--disp);font-weight:700;font-size:20px;color:var(--muted);margin-top:4px;\">a) the net (A base, B &amp; C rectangles, D &amp; E triangles)<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:12px;\">\n          <div class=\"card\" style=\"font-family:var(--disp);font-weight:700;font-size:28px;line-height:1.4;\">A = 8 × 6 = <b>48<\u002Fb> &nbsp;·&nbsp; B = C = 8 × 5 = <b>40<\u002Fb> &nbsp;·&nbsp; D = E = ½ × 6 × 4 = <b>12<\u002Fb><\u002Fdiv>\n          <div class=\"card\" style=\"font-family:var(--disp);font-weight:800;font-size:30px;line-height:1.4;background:#EAFBF6;border-color:#B8E9DE;\">SA = 48 + 40×2 + 12×2 = 48 + 80 + 24 = <b>152 cm²<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Ex 15.4 · Q2\" data-speaker-notes=\"Exercise 15.4, question 2. For each of these solids, part i sketch a net, and part ii work out the surface area. Part a: an isosceles triangular prism, base 24, height 5, slant 13, length 30. Surface area 1620 square centimetres. Part b: a right-angled triangular prism, sides 6, 8 and 10, length 9. Surface area 264 square centimetres. Part c: a square-based pyramid with all triangles equal, base 18, slant height 12. Surface area 756 square centimetres. Part d: a triangular-based pyramid with all triangles equal, base 15, slant 13. Surface area 390 square centimetres.\">\n    <div class=\"slide\" data-screen-label=\"Ex 15.4 · Q2\">\n      <div class=\"head\"><span class=\"kicker\">EXERCISE 15.4 · Q2 · TAP TO CHECK<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Sketch a net, then find the surface area<\u002Fh2>\n      <div class=\"fill\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;align-content:center;\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;align-items:center;\"><div class=\"gridwrap\" style=\"max-width:308px;padding:12px;\"><svg viewBox=\"0 0 320 198\" style=\"width:100%;height:auto;max-width:448px;\"><polygon points=\"160,158 280,100 220,40 100,98\" fill=\"rgba(22,198,164,.16)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"40,158 160,100 220,40 100,98\" fill=\"rgba(22,198,164,.16)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"160,100 280,100 220,40\" fill=\"none\" stroke=\"#21304A\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-dasharray=\"5 4\"><\u002Fpolygon><line x1=\"40\" y1=\"158\" x2=\"160\" y2=\"100\" stroke=\"#21304A\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><polygon points=\"40,158 160,158 100,98\" fill=\"rgba(22,198,164,.3)\" stroke=\"#21304A\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpolygon><line x1=\"100\" y1=\"98\" x2=\"100\" y2=\"158\" stroke=\"#21304A\" stroke-width=\"2\" stroke-dasharray=\"4 3\"><\u002Fline><text x=\"108\" y=\"134\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#6A7590\" text-anchor=\"start\">5 cm<\u002Ftext><text x=\"100\" y=\"182\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#21304A\" text-anchor=\"middle\">24 cm<\u002Ftext><text x=\"54\" y=\"128\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#6A7590\" text-anchor=\"start\">13 cm<\u002Ftext><text x=\"162\" y=\"145\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#21304A\" text-anchor=\"start\">30 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><div class=\"tile q\" data-toggle=\"\" style=\"width:100%;\"><div class=\"num\" style=\"font-size:21px;\"><b class=\"hl-t\">a)<\u002Fb> isosceles prism<\u002Fdiv><div class=\"rev\" style=\"font-size:26px;\">2 triangles (½×24×5) + base 24×30 + 2 slants 13×30 = <b>1620 cm²<\u002Fb><\u002Fdiv><div class=\"cap\">tap<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;align-items:center;\"><div class=\"gridwrap\" style=\"max-width:308px;padding:12px;\"><svg viewBox=\"0 0 324 318\" role=\"img\" style=\"width:100%;height:auto;max-width:454px;\"><polygon points=\"42,116 162,42 282,202 162,276\" fill=\"rgba(22,198,164,.16)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"42,276 162,202 282,202 162,276\" fill=\"rgba(22,198,164,.16)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"162,202 162,42 282,202\" fill=\"none\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-dasharray=\"5 4\"><\u002Fpolygon><line x1=\"42\" y1=\"276\" x2=\"162\" y2=\"202\" stroke=\"#21304A\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><polygon points=\"42,276 42,116 162,276\" fill=\"rgba(22,198,164,.32)\" stroke=\"#21304A\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"54\" y=\"202\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"22\" fill=\"#21304A\" text-anchor=\"start\">8 cm<\u002Ftext><text x=\"102\" y=\"302\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"22\" fill=\"#21304A\" text-anchor=\"middle\">6 cm<\u002Ftext><text x=\"166\" y=\"259\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"22\" fill=\"#21304A\" text-anchor=\"start\">10 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><div class=\"tile q\" data-toggle=\"\" style=\"width:100%;\"><div class=\"num\" style=\"font-size:21px;\"><b class=\"hl-t\">b)<\u002Fb> right-angled prism<br><span style=\"font-weight:600;font-size:18px;color:var(--muted);\">6, 8, 10, length 9<\u002Fspan><\u002Fdiv><div class=\"rev\" style=\"font-size:26px;\">2×(½×6×8) + 6×9 + 8×9 + 10×9 = <b>264 cm²<\u002Fb><\u002Fdiv><div class=\"cap\">tap<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;align-items:center;\"><div class=\"gridwrap\" style=\"max-width:308px;padding:12px;\"><svg viewBox=\"0 0 282 210\" style=\"width:100%;height:auto;max-width:420px;\"><polygon points=\"40,170 170,170 222,140 92,140\" fill=\"rgba(255,107,91,.14)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><line x1=\"40\" y1=\"170\" x2=\"131\" y2=\"30\" stroke=\"#21304A\" stroke-width=\"2\"><\u002Fline><line x1=\"170\" y1=\"170\" x2=\"131\" y2=\"30\" stroke=\"#21304A\" stroke-width=\"2\"><\u002Fline><line x1=\"222\" y1=\"140\" x2=\"131\" y2=\"30\" stroke=\"#21304A\" stroke-width=\"2\"><\u002Fline><line x1=\"92\" y1=\"140\" x2=\"131\" y2=\"30\" stroke=\"#21304A\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><polygon points=\"40,170 170,170 131,30\" fill=\"rgba(255,107,91,.3)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"105\" y=\"192\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#21304A\" text-anchor=\"middle\">18 cm<\u002Ftext><text x=\"166.5\" y=\"100\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#6A7590\" text-anchor=\"start\">12 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><div class=\"tile q\" data-toggle=\"\" style=\"width:100%;\"><div class=\"num\" style=\"font-size:21px;\"><b class=\"hl-t\">c)<\u002Fb> square pyramid<\u002Fdiv><div class=\"rev\" style=\"font-size:26px;\">18×18 + 4×(½×18×12) = 324 + 432 = <b>756 cm²<\u002Fb><\u002Fdiv><div class=\"cap\">tap<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;align-items:center;\"><div class=\"gridwrap\" style=\"max-width:308px;padding:12px;\"><svg viewBox=\"0 0 260 220\" style=\"width:100%;height:auto;max-width:420px;\"><polygon points=\"50,190 200,190 143,120\" fill=\"rgba(22,198,164,.14)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><line x1=\"50\" y1=\"190\" x2=\"113\" y2=\"50\" stroke=\"#21304A\" stroke-width=\"2\"><\u002Fline><line x1=\"200\" y1=\"190\" x2=\"113\" y2=\"50\" stroke=\"#21304A\" stroke-width=\"2\"><\u002Fline><line x1=\"143\" y1=\"120\" x2=\"113\" y2=\"50\" stroke=\"#21304A\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><polygon points=\"50,190 200,190 113,50\" fill=\"rgba(22,198,164,.3)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"125\" y=\"212\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#21304A\" text-anchor=\"middle\">15 cm<\u002Ftext><text x=\"170.5\" y=\"120\" font-family=\"Baloo 2\" font-weight=\"800\" font-size=\"22\" fill=\"#6A7590\" text-anchor=\"start\">13 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><div class=\"tile q\" data-toggle=\"\" style=\"width:100%;\"><div class=\"num\" style=\"font-size:21px;\"><b class=\"hl-t\">d)<\u002Fb> triangular pyramid<\u002Fdiv><div class=\"rev\" style=\"font-size:26px;\">4 × (½×15×13) = 4 × 97.5 = <b>390 cm²<\u002Fb><\u002Fdiv><div class=\"cap\">tap<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Ex 15.4 · Q3\" data-speaker-notes=\"Exercise 15.4, question 3. The diagram shows a triangular prism and a cube. Which shape has the greater surface area? Show your working. For the prism: two triangles a half times 6 times 4 equals 12 each, plus rectangles 6 times 15 equals 90, and 5 times 15 equals 75 twice. Total 24 plus 90 plus 150 equals 264 square centimetres. For the cube: six faces of 7 times 7, six times 49 equals 294 square centimetres. The cube has the greater surface area.\">\n    <div class=\"slide\" data-screen-label=\"Ex 15.4 · Q3\">\n      <div class=\"head\"><span class=\"kicker\">EXERCISE 15.4 · Q3 · TAP TO CHECK<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Which has the greater surface area?<\u002Fh2>\n      <div class=\"fill\" style=\"display:flex;gap:30px;align-items:center;\">\n        <div style=\"flex:0 0 auto;display:flex;gap:16px;\"><div class=\"gridwrap\" style=\"max-width:400px;padding:12px;\"><svg viewBox=\"0 0 330 316\" role=\"img\" style=\"width:100%;height:auto;max-width:400px;\"><polygon points=\"42,134 192,42 288,182 138,274\" fill=\"rgba(255,107,91,.16)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"42,274 192,182 288,182 138,274\" fill=\"rgba(255,107,91,.16)\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"192,182 192,42 288,182\" fill=\"none\" stroke=\"#21304A\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-dasharray=\"5 4\"><\u002Fpolygon><line x1=\"42\" y1=\"274\" x2=\"192\" y2=\"182\" stroke=\"#21304A\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><polygon points=\"42,274 42,134 138,274\" fill=\"rgba(255,107,91,.32)\" stroke=\"#21304A\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"48\" y=\"210\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"24\" fill=\"#21304A\" text-anchor=\"end\">6 cm<\u002Ftext><text x=\"90\" y=\"300\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"24\" fill=\"#21304A\" text-anchor=\"middle\">4 cm<\u002Ftext><text x=\"169\" y=\"248\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"24\" fill=\"#21304A\" text-anchor=\"start\">15 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><div class=\"gridwrap\" style=\"max-width:300px;padding:12px;\"><svg viewBox=\"0 0 284 186\" role=\"img\" style=\"width:100%;height:auto;max-width:300px;\"><polygon points=\"94,40 244,40 244,112 94,112\" fill=\"none\" stroke=\"#c8891a\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-dasharray=\"5 4\"><\u002Fpolygon><line x1=\"40\" y1=\"74\" x2=\"94\" y2=\"40\" stroke=\"#c8891a\" stroke-width=\"2\" stroke-dasharray=\"5 4\"><\u002Fline><polygon points=\"190,74 244,40 244,112 190,146\" fill=\"rgba(242,179,61,.6)\" stroke=\"#c8891a\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"40,74 94,40 244,40 190,74\" fill=\"rgba(242,179,61,.6)\" stroke=\"#c8891a\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpolygon><polygon points=\"40,74 190,74 190,146 40,146\" fill=\"rgba(242,179,61,.6)\" stroke=\"#c8891a\" stroke-width=\"3\" stroke-linejoin=\"round\"><\u002Fpolygon><text x=\"115\" y=\"174\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"24\" fill=\"#21304A\" text-anchor=\"middle\">6 cm<\u002Ftext><text x=\"202\" y=\"116\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"24\" fill=\"#21304A\" text-anchor=\"start\">3 cm<\u002Ftext><text x=\"225\" y=\"53\" font-family=\"Baloo 2, sans-serif\" font-weight=\"800\" font-size=\"24\" fill=\"#21304A\" text-anchor=\"start\">4 cm<\u002Ftext><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:12px;\">\n          <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">prism)<\u002Fb> triangular prism (4, 6, 15, 5)<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;line-height:1.4;\">2×(½×6×4) + 6×15 + 2×(5×15) = 24 + 90 + 150 = <b>264 cm²<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n          <div class=\"tile q\" data-toggle=\"\"><div class=\"num\" style=\"font-size:27px;line-height:1.35;\"><b class=\"hl-t\">cube)<\u002Fb> cube of side 7<\u002Fdiv><div class=\"rev\" style=\"font-size:27px;line-height:1.4;\">6 × 7 × 7 = <b>294 cm²<\u002Fb><\u002Fdiv><div class=\"cap\">tap to check<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"font-family:var(--disp);font-weight:800;font-size:28px;background:#EAFBF6;border-color:#B8E9DE;text-align:center;\">The <b>cube<\u002Fb> has the greater surface area (294 &gt; 264).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Whole-unit drill\" data-speaker-notes=\"A final memory drill for the whole unit. Flip each card. To change kilometres to miles, multiply by five eighths; to change miles to km, multiply by eight fifths. Area of a parallelogram is base times height. Area of a trapezium is a half times a plus b, times h. Volume of a prism is area of cross-section times length. Surface area is the total area of all the faces.\">\n    <div class=\"slide\" data-screen-label=\"Whole-unit drill\">\n      <div class=\"head\"><span class=\"kicker yellow\">WHOLE-UNIT DRILL · FLIP THE CARDS<\u002Fspan><\u002Fdiv>\n      <h2 class=\"title\">Review everything<\u002Fh2>\n      <div class=\"fill drillgrid\" style=\"grid-template-columns:1fr 1fr 1fr;grid-auto-rows:1fr;align-content:center;\">\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">miles → km?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">× 8⁄5<\u002Fdiv><div class=\"fhint\">divide by 5, × 8<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Area of a<br>parallelogram?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">A = bh<\u002Fdiv><div class=\"fhint\">base × height<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Area of a<br>trapezium?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">A = ½(a+b)h<\u002Fdiv><div class=\"fhint\">add parallel sides first<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Volume of<br>a prism?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">cross-section × length<\u002Fdiv><div class=\"fhint\">½bh × l for a triangle<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">Surface area?<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">area of all faces<\u002Fdiv><div class=\"fhint\">use the net<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"flashcard\"><div class=\"fcinner\"><div class=\"fcface\"><div class=\"fcq\">km ≈ ? of<br>a mile<\u002Fdiv><div class=\"fhint\">tap to flip<\u002Fdiv><\u002Fdiv><div class=\"fcface fcback\"><div class=\"fca\">⁵⁄₈<\u002Fdiv><div class=\"fhint\">a km is shorter<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Closing\" data-speaker-notes=\"That completes Unit 15. You can now: convert between miles and kilometres; find the area of a parallelogram and a trapezium; work out the volume of triangular and compound prisms; and calculate the surface area of prisms and pyramids using a net. Well done.\">\n    <div class=\"slide\" data-screen-label=\"Closing\" style=\"justify-content:center;background:linear-gradient(160deg,#FFFDF7,#EEF6FF);\">\n      <div class=\"blob\" style=\"width:360px;height:360px;background:var(--sky);top:-120px;right:-80px;animation:float 7s ease-in-out infinite;\"><\u002Fdiv>\n      <div class=\"blob\" style=\"width:280px;height:280px;background:var(--teal);bottom:-90px;left:-50px;animation:float 9s ease-in-out infinite;\"><\u002Fdiv>\n      <div class=\"fill\" style=\"display:flex;flex-direction:column;justify-content:center;max-width:1500px;\">\n        <span class=\"kicker teal\" style=\"align-self:flex-start;\">UNIT 15 · COMPLETE<\u002Fspan>\n        <h1 class=\"title\" style=\"font-size:82px;margin-top:16px;\">You can now…<\u002Fh1>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:20px;font-family:var(--disp);font-weight:700;font-size:30px;color:var(--ink);\">\n          <div>✓ convert between miles and kilometres<\u002Fdiv>\n          <div>✓ find the area of a parallelogram and a trapezium<\u002Fdiv>\n          <div>✓ work out the volume of triangular &amp; compound prisms<\u002Fdiv>\n          <div>✓ calculate surface area using a net<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<script>
(function(){
  var canvas = document.getElementById('sbsAnnoCanvas');
  var ctx = canvas.getContext('2d');
  var dpr = Math.max(1, window.devicePixelRatio || 1);

  var state = {
    on:false, tool:'pen', color:'#8B1A1A', fingerDraws:false,
    drawing:false, strokes:[], current:null
  };

  function docSize(){
    var d=document.documentElement, b=document.body;
    return {
      w: Math.max(d.scrollWidth, b?b.scrollWidth:0, window.innerWidth),
      h: Math.max(d.scrollHeight, b?b.scrollHeight:0, window.innerHeight)
    };
  }
  function resize(){
    var s=docSize();
    canvas.style.width=s.w+'px'; canvas.style.height=s.h+'px';
    canvas.width=Math.floor(s.w*dpr); canvas.height=Math.floor(s.h*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    redraw();
  }
  function redraw(){
    ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
    for(var i=0;i<state.strokes.length;i++) paint(state.strokes[i]);
  }
  function paint(st){
    if(!st.pts.length) return;
    ctx.lineCap='round'; ctx.lineJoin='round';
    if(st.tool==='erase'){ ctx.globalCompositeOperation='destination-out'; ctx.globalAlpha=1; ctx.lineWidth=28; }
    else if(st.tool==='hi'){ ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=.32; ctx.lineWidth=20; ctx.strokeStyle=st.color; }
    else { ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1; ctx.lineWidth=3.2; ctx.strokeStyle=st.color; }
    ctx.beginPath(); ctx.moveTo(st.pts[0].x, st.pts[0].y);
    for(var i=1;i<st.pts.length;i++) ctx.lineTo(st.pts[i].x, st.pts[i].y);
    ctx.stroke();
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  }

  function shouldDraw(e){
    if(!state.on) return false;
    if(e.pointerType==='touch' && !state.fingerDraws) return false; // finger scrolls
    return true;
  }
  function pt(e){ return {x:e.pageX, y:e.pageY}; }

  canvas.addEventListener('pointerdown', function(e){
    if(!shouldDraw(e)) return;
    state.drawing=true;
    state.current={tool:state.tool, color:state.color, pts:[pt(e)]};
    e.preventDefault();
  });
  canvas.addEventListener('pointermove', function(e){
    if(!state.drawing || !shouldDraw(e)) return;
    state.current.pts.push(pt(e));
    // draw just the last segment live
    var p=state.current.pts, n=p.length;
    if(n>=2){ paint({tool:state.current.tool, color:state.current.color, pts:[p[n-2],p[n-1]]}); }
    e.preventDefault();
  });
  function endStroke(e){
    if(!state.drawing) return;
    state.drawing=false;
    if(state.current && state.current.pts.length){ state.strokes.push(state.current); }
    state.current=null;
    redraw();
  }
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);
  canvas.addEventListener('pointerleave', endStroke);

  // ---- toolbar ----
  var bar=document.getElementById('sbsAnnoBar');
  var power=document.getElementById('sbsAnnoPower');
  function setActiveTool(id){
    ['sbsAnnoHi','sbsAnnoErase'].forEach(function(x){ document.getElementById(x).classList.remove('active'); });
    if(id) document.getElementById(id).classList.add('active');
  }
  power.addEventListener('click', function(){
    state.on=!state.on;
    canvas.classList.toggle('on', state.on);
    power.textContent='Pen: '+(state.on?'on':'off');
    power.classList.toggle('live', state.on);
  });
  bar.querySelectorAll('.swatch').forEach(function(sw){
    sw.addEventListener('click', function(){
      bar.querySelectorAll('.swatch').forEach(function(s){s.classList.remove('active');});
      sw.classList.add('active');
      state.color=sw.getAttribute('data-color');
      state.tool='pen'; setActiveTool(null);
    });
  });
  document.getElementById('sbsAnnoHi').addEventListener('click', function(){
    state.tool = state.tool==='hi' ? 'pen' : 'hi';
    setActiveTool(state.tool==='hi'?'sbsAnnoHi':null);
  });
  document.getElementById('sbsAnnoErase').addEventListener('click', function(){
    state.tool = state.tool==='erase' ? 'pen' : 'erase';
    setActiveTool(state.tool==='erase'?'sbsAnnoErase':null);
  });
  document.getElementById('sbsAnnoUndo').addEventListener('click', function(){
    state.strokes.pop(); redraw();
  });
  document.getElementById('sbsAnnoClear').addEventListener('click', function(){
    state.strokes=[]; redraw();
  });
  var finger=document.getElementById('sbsAnnoFinger');
  finger.addEventListener('click', function(){
    state.fingerDraws=!state.fingerDraws;
    finger.classList.toggle('active', state.fingerDraws);
    canvas.classList.toggle('fingerdraw', state.fingerDraws);
  });

  // keep canvas sized to the page (content can grow after load)
  window.addEventListener('load', resize);
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function(){ setTimeout(resize,300); });
  if('ResizeObserver' in window){ new ResizeObserver(function(){ resize(); }).observe(document.body); }
  resize();
})();
</script>
<!-- ============================================================= -->
<!-- ===== end SBS ANNOTATE block ================================ -->
</body>
</html>
